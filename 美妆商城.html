<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美妆商城 - 美妆商品</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC","Microsoft YaHei",sans-serif;
        }

        /* 低饱和柔和主色调 */
        :root {
            --color-bg: #f9f6f6;
            --color-card: #ffffff;
            --color-primary: #d4b2b2;
            --color-text: #6b5555;
            --color-text-light: #997f7f;
            --shadow: 0 3px 12px rgba(180, 150, 150, 0.08);
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.5;
        }

        /* 顶部大图背景 */
        .top-banner {
            width: 100%;
            height: 200px;
            background: linear-gradient(rgba(255,255,255,0.5), rgba(255,255,255,0.5)), 
                        url('https://images.unsplash.com/photo-1555529669-e69e7aa0ba9a?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 600;
            color: #8c6666;
            position: relative;
        }

        /* 容器 */
        .container {
            max-width: 750px;
            margin: 0 auto;
            padding: 20px 15px;
        }

        /* 标题 */
        .page-title {
            text-align: center;
            font-size: 24px;
            margin-bottom: 25px;
            color: #8c6666;
            position: relative;
        }

        .page-title::after {
            content: "";
            width: 50px;
            height: 3px;
            background: var(--color-primary);
            display: block;
            margin: 8px auto 0;
            border-radius: 3px;
        }

        /* 商品网格布局 */
        .goods-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            margin-bottom: 100px;
        }

        /* 商品卡片 */
        .goods-card {
            background: var(--color-card);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .goods-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 18px rgba(180, 150, 150, 0.12);
        }

        /* 商品高清图片 */
        .goods-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
        }

        /* 商品信息 */
        .goods-info {
            padding: 14px;
        }

        .goods-name {
            font-size: 15px;
            color: var(--color-text);
            margin-bottom: 8px;
            height: 42px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .goods-price {
            font-size: 19px;
            font-weight: bold;
            color: #c98e8e;
            margin-bottom: 12px;
        }

        /* 购买按钮 */
        .buy-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 12px;
            background-color: var(--color-primary);
            color: #fff;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .buy-btn:hover {
            background-color: #c9a1a1;
        }

        /* 底部购物车 */
        .cart-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #fff;
            padding: 15px 20px;
            box-shadow: 0 -2px 10px rgba(180,150,150,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 99;
        }

        .cart-info {
            line-height: 1.4;
        }

        .cart-count {
            font-size: 14px;
            color: var(--color-text-light);
        }

        .cart-total {
            font-size: 18px;
            font-weight: bold;
            color: #c98e8e;
        }

        .checkout-btn {
            padding: 11px 24px;
            border-radius: 30px;
            background-color: var(--color-primary);
            color: #fff;
            border: none;
            font-size: 15px;
            cursor: pointer;
        }

        /* 提示弹窗 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(110, 85, 85, 0.9);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            z-index: 999;
        }

        .toast.show {
            display: block;
        }

        /* 手机适配 */
        @media (max-width: 500px) {
            .goods-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            .top-banner {
                height: 160px;
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

<!-- 顶部背景图 -->
<div class="top-banner">美妆商城 · 精选好物</div>

<div class="container">
    <h2 class="page-title">美妆商品</h2>

    <!-- 商品列表 -->
    <div class="goods-grid" id="goodsGrid"></div>
</div>

<!-- 底部购物车 -->
<div class="cart-bar">
    <div class="cart-info">
        <div class="cart-count">已选 <span id="cartNum">0</span> 件</div>
        <div class="cart-total">¥<span id="cartTotal">0</span></div>
    </div>
    <button class="checkout-btn" onclick="checkout()">去结算</button>
</div>

<!-- 提示弹窗 -->
<div class="toast" id="toast"></div>

<script>
    // 8款高清美妆商品（自带网络图片）
    const goodsList = [
        {
            id: 1,
            name: "轻薄持妆粉底液 遮瑕控油",
            price: 98,
            img: "https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80"
        },
        {
            id: 2,
            name: "柔焦定妆散粉 持久控油",
            price: 69,
            img: "https://images.unsplash.com/photo-1529059752549-803861e7b735?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80"
        },
        {
            id: 3,
            name: "丝绒哑光口红 滋润不拔干",
            price: 79,
            img: "https://images.unsplash.com/photo-1581337284354-02f10160d054?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80"
        },
        {
            id: 4,
            name: "温和卸妆水 深层清洁无刺激",
            price: 59,
            img: "https://images.unsplash.com/photo-1601268851800-4e6459725931?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80"
        },
        {
            id: 5,
            name: "保湿补水面膜 舒缓修护",
            price: 89,
            img: "https://images.unsplash.com/photo-1556228720-0f6d1f8a4d1a?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80"
        },
        {
            id: 6,
            name: "高光修容综合盘 立体提亮",
            price: 85,
            img: "https://images.unsplash.com/photo-1593504341339-0a803e26c2c4?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80"
        },
        {
            id: 7,
            name: "浓密卷翘睫毛膏 防水不晕染",
            price: 55,
            img: "https://images.unsplash.com/photo-1635590862139-45751145c73e?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80"
        },
        {
            id: 8,
            name: "隔离妆前乳 提亮隐形毛孔",
            price: 75,
            img: "https://images.unsplash.com/photo-1559155760-afa830941e5b?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80"
        }
    ];

    let cart = [];

    // 页面加载生成商品
    window.onload = function () {
        let grid = document.getElementById('goodsGrid');
        goodsList.forEach(item => {
            let card = document.createElement('div');
            card.className = 'goods-card';
            card.innerHTML = `
                <img src="${item.img}" class="goods-img" alt="${item.name}">
                <div class="goods-info">
                    <div class="goods-name">${item.name}</div>
                    <div class="goods-price">¥${item.price}</div>
                    <button class="buy-btn" onclick="addCart(${item.id})">加入购物车</button>
                </div>
            `;
            grid.appendChild(card);
        });
        updateCart();
    };

    // 提示框
    function showToast(text) {
        let t = document.getElementById('toast');
        t.textContent = text;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 1500);
    }

    // 加入购物车
    function addCart(id) {
        let item = goodsList.find(g => g.id === id);
        if (!item) return;
        cart.push(item);
        updateCart();
        showToast(`已加入：${item.name}`);
    }

    // 更新购物车
    function updateCart() {
        document.getElementById('cartNum').innerText = cart.length;
        let total = cart.reduce((sum, cur) => sum + cur.price, 0);
        document.getElementById('cartTotal').innerText = total;
    }

    // 结算
    function checkout() {
        if (cart.length === 0) {
            showToast('请先选择商品');
            return;
        }
        showToast(`结算成功！共支付 ¥${cart.reduce((s,i)=>s+i.price,0)} 元`);
        cart = [];
        updateCart();
    }
</script>

</body>
</html>
